  <style>
    :root {
      --bg: #080808;
      --panel: rgba(16,16,16,.76);
      --text: #f4f1ea;
      --muted: rgba(244,241,234,.68);
      --line: rgba(255,255,255,.16);
      --accent: #ffffff;
      --thumb: 78px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; width:100%; min-height:100%; background:var(--bg); color:var(--text); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; overflow:hidden; }
    body { min-height:100svh; }
    .app { position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr auto; background: radial-gradient(circle at 50% 10%, #262626 0, #090909 56%, #000 100%); }
    .topbar { height:44px; padding: calc(8px + var(--safe-top)) clamp(14px, 3vw, 34px) 8px; display:flex; align-items:center; justify-content:space-between; gap:14px; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:var(--muted); user-select:none; }
    .brand { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .count { flex:0 0 auto; color:var(--text); letter-spacing:.08em; }
    .stage { position:relative; min-height:0; display:flex; align-items:center; justify-content:center; padding: 6px clamp(12px, 4vw, 58px) 10px; }
    .frame { position:relative; width:min(1500px, 100%); height:100%; display:flex; align-items:center; justify-content:center; }
    .page { max-width:100%; max-height:100%; object-fit:contain; display:block; border-radius:14px; box-shadow: 0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08); background:#111; transition: opacity .18s ease, transform .18s ease; }
    .page.changing { opacity:.35; transform:scale(.992); }
    .nav { position:absolute; top:50%; transform:translateY(-50%); width:54px; height:54px; border-radius:999px; border:1px solid var(--line); background:rgba(0,0,0,.42); color:#fff; display:grid; place-items:center; font-size:31px; line-height:1; cursor:pointer; -webkit-tap-highlight-color:transparent; backdrop-filter: blur(8px); }
    .nav:hover { background:rgba(255,255,255,.13); }
    .nav:disabled { opacity:.22; cursor:default; }
    .prev { left: clamp(8px, 2vw, 32px); }
    .next { right: clamp(8px, 2vw, 32px); }
    .bottom { padding: 6px clamp(10px, 3vw, 32px) calc(12px + var(--safe-bottom)); display:grid; gap:8px; }
    .progress { height:3px; background:rgba(255,255,255,.18); border-radius:20px; overflow:hidden; }
    .bar { height:100%; width:0%; background:#fff; border-radius:20px; }
    .thumbs { display:flex; gap:8px; overflow-x:auto; overflow-y:hidden; padding:3px 0 2px; scrollbar-color:#fff rgba(255,255,255,.15); }
    .thumb { flex:0 0 auto; width:var(--thumb); height:48px; border:1px solid rgba(255,255,255,.16); border-radius:9px; overflow:hidden; background:#1a1a1a; padding:0; cursor:pointer; opacity:.58; }
    .thumb.active { opacity:1; outline:2px solid #fff; outline-offset:2px; }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .hint { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); color:rgba(255,255,255,.56); font-size:11px; letter-spacing:.08em; text-transform:uppercase; pointer-events:none; }
    @media (orientation:portrait) {
      .topbar { height:auto; min-height:42px; font-size:10px; padding-left:12px; padding-right:12px; }
      .stage { padding: 4px 10px 8px; }
      .nav { width:44px; height:44px; font-size:26px; background:rgba(0,0,0,.54); }
      .prev { left:8px; } .next { right:8px; }
      :root { --thumb: 60px; }
      .thumb { height:42px; }
      .page { border-radius:10px; }
    }
    @media (max-width:720px) {
      .brand { max-width: 70vw; }
      .bottom { gap:6px; }
      .hint { display:none; }
    }
    @media (prefers-reduced-motion: reduce) { .page { transition:none; } }
  </style>
</head>
<body>
  <main class="app" aria-label="Libro regalo 18 cumpleaños">
    <header class="topbar">
      <div class="brand">Libro regalo · 18 cumpleaños</div>
      <div class="count" id="count">1 / 19</div>
    </header>

    <section class="stage" id="stage">
      <div class="frame">
        <img id="page" class="page" src="assets/pages/page-01.png" alt="Página 1 del libro" draggable="false">
      </div>
      <button class="nav prev" id="prev" aria-label="Página anterior">‹</button>
      <button class="nav next" id="next" aria-label="Página siguiente">›</button>
      <div class="hint">Flechas · teclado · deslizar</div>
    </section>

    <footer class="bottom">
      <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
      <div class="thumbs" id="thumbs" aria-label="Miniaturas de páginas"></div>
    </footer>
  </main>

  <script>
    const pages = [{"src": "assets/pages/page-01.png", "w": 1177, "h": 1337, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (1).png"}, {"src": "assets/pages/page-02.png", "w": 1488, "h": 1057, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (2).png"}, {"src": "assets/pages/page-03.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (3).png"}, {"src": "assets/pages/page-04.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (4).png"}, {"src": "assets/pages/page-05.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (5).png"}, {"src": "assets/pages/page-06.png", "w": 1462, "h": 1076, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (6).png"}, {"src": "assets/pages/page-07.png", "w": 1536, "h": 1024, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (7).png"}, {"src": "assets/pages/page-08.png", "w": 1467, "h": 1072, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (8).png"}, {"src": "assets/pages/page-09.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_11_28 (9).png"}, {"src": "assets/pages/page-10.png", "w": 1470, "h": 1070, "original": "ChatGPT Image 7 jul 2026, 23_11_29 (10).png"}, {"src": "assets/pages/page-11.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (11).png"}, {"src": "assets/pages/page-12.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (12).png"}, {"src": "assets/pages/page-13.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (13).png"}, {"src": "assets/pages/page-14.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (14).png"}, {"src": "assets/pages/page-15.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (15).png"}, {"src": "assets/pages/page-16.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (16).png"}, {"src": "assets/pages/page-17.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_20 (17).png"}, {"src": "assets/pages/page-18.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_21 (18).png"}, {"src": "assets/pages/page-19.png", "w": 1448, "h": 1086, "original": "ChatGPT Image 7 jul 2026, 23_28_21 (19).png"}];
    let current = 0;
    const img = document.getElementById('page');
    const count = document.getElementById('count');
    const bar = document.getElementById('bar');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const thumbs = document.getElementById('thumbs');
    const stage = document.getElementById('stage');

    pages.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'thumb';
      b.type = 'button';
      b.setAttribute('aria-label', 'Ir a página ' + (i + 1));
      b.innerHTML = `<img loading="lazy" src="${p.src}" alt="Miniatura página ${i + 1}">`;
      b.addEventListener('click', () => go(i));
      thumbs.appendChild(b);
    });

    function updateHash() {
      const value = '#p=' + (current + 1);
      if (location.hash !== value) history.replaceState(null, '', value);
    }

    function readHash() {
      const m = location.hash.match(/p=(\d+)/);
      if (!m) return 0;
      const n = Math.max(1, Math.min(pages.length, parseInt(m[1], 10) || 1));
      return n - 1;
    }

    function go(i, skipHash = false) {
      const target = Math.max(0, Math.min(pages.length - 1, i));
      if (target === current && img.src.includes(pages[target].src)) return;
      current = target;
      img.classList.add('changing');
      const p = pages[current];
      const loader = new Image();
      loader.onload = () => {
        img.src = p.src;
        img.alt = 'Página ' + (current + 1) + ' del libro';
        requestAnimationFrame(() => img.classList.remove('changing'));
      };
      loader.src = p.src;
      count.textContent = (current + 1) + ' / ' + pages.length;
      bar.style.width = (((current + 1) / pages.length) * 100).toFixed(2) + '%';
      prev.disabled = current === 0;
      next.disabled = current === pages.length - 1;
      [...thumbs.children].forEach((t, idx) => t.classList.toggle('active', idx === current));
      const active = thumbs.children[current];
      if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      if (!skipHash) updateHash();
      preload(current + 1);
      preload(current - 1);
    }

    function preload(i) {
      if (i < 0 || i >= pages.length) return;
      const im = new Image();
      im.src = pages[i].src;
    }

    prev.addEventListener('click', () => go(current - 1));
    next.addEventListener('click', () => go(current + 1));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go(current - 1);
      if (e.key === 'ArrowRight' || e.key === ' ') go(current + 1);
      if (e.key === 'Home') go(0);
      if (e.key === 'End') go(pages.length - 1);
    });
    window.addEventListener('hashchange', () => go(readHash(), true));

    let sx = 0, sy = 0;
    stage.addEventListener('touchstart', e => { sx = e.changedTouches[0].clientX; sy = e.changedTouches[0].clientY; }, {passive:true});
    stage.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) go(current + (dx < 0 ? 1 : -1));
    }, {passive:true});

    go(readHash(), true);
  </script>

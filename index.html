<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Revista Izan · 18 cumpleaños</title>
  <meta name="description" content="Revista regalo de 18 cumpleaños de Izan.">
  <meta property="og:title" content="Revista Izan · 18 cumpleaños">
  <meta property="og:description" content="Revista regalo de 18 cumpleaños de Izan.">
  <meta property="og:image" content="assets/preview/preview.jpg">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0d0d0d">
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: rgba(255,255,255,.08);
      --panel-2: rgba(255,255,255,.14);
      --text: #f7f2ea;
      --muted: rgba(247,242,234,.72);
      --line: rgba(255,255,255,.16);
      --shadow: 0 24px 70px rgba(0,0,0,.45);
      --radius: 18px;
      --thumb-h: 70px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif; overflow: hidden; }
    body { background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.14), transparent 28%),
      radial-gradient(circle at 80% 20%, rgba(218,190,140,.12), transparent 34%),
      linear-gradient(135deg, #050506 0%, #101012 54%, #070707 100%);
    }
    .app { width: 100vw; height: 100svh; display: grid; grid-template-rows: 54px 1fr 98px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 clamp(14px, 3vw, 34px); border-bottom: 1px solid var(--line); background: rgba(0,0,0,.24); backdrop-filter: blur(14px); }
    .brand { min-width: 0; }
    .brand strong { display:block; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand span { display:block; margin-top: 2px; color: var(--muted); font-size: 12px; }
    .top-actions { display:flex; align-items:center; gap:10px; white-space: nowrap; }
    .counter { color: var(--muted); font-size: 13px; letter-spacing: .08em; }
    .btn, .navbtn { border: 1px solid var(--line); color: var(--text); background: var(--panel); cursor: pointer; transition: transform .16s ease, background .16s ease, border-color .16s ease; }
    .btn:hover, .navbtn:hover { background: var(--panel-2); border-color: rgba(255,255,255,.3); }
    .btn:active, .navbtn:active { transform: scale(.97); }
    .btn { height: 34px; padding: 0 13px; border-radius: 999px; font-size: 12px; text-decoration: none; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    main { position: relative; min-height: 0; display: grid; place-items: center; padding: clamp(10px, 2.2vw, 26px) clamp(48px, 6vw, 94px); }
    .stage { position: relative; width: min(100%, calc((100svh - 180px) * 1.333333)); aspect-ratio: 1448 / 1086; max-height: calc(100svh - 180px); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #111; transform: translateZ(0); }
    .page { position: absolute; inset: 0; opacity: 0; transform: translateX(26px) scale(.992); transition: opacity .26s ease, transform .26s ease; pointer-events: none; }
    .page.active { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
    .page.prev-exit { transform: translateX(-26px) scale(.992); }
    .page img { width: 100%; height: 100%; object-fit: contain; display: block; background: #111; user-select: none; -webkit-user-drag: none; }
    .navbtn { position: absolute; top: 50%; z-index: 5; width: 48px; height: 48px; margin-top: -24px; border-radius: 999px; font-size: 30px; line-height: 1; display:flex; align-items:center; justify-content:center; }
    .navbtn.left { left: clamp(8px, 2vw, 28px); }
    .navbtn.right { right: clamp(8px, 2vw, 28px); }
    .navbtn[disabled] { opacity: .32; cursor: default; }
    .bottom { min-height: 0; border-top: 1px solid var(--line); background: rgba(0,0,0,.28); backdrop-filter: blur(14px); display: grid; grid-template-rows: 8px 1fr; }
    .progress { position:relative; height: 8px; background: rgba(255,255,255,.08); }
    .bar { position:absolute; inset:0 auto 0 0; width: 0; background: rgba(247,242,234,.92); transition: width .22s ease; }
    .thumbs { display:flex; gap: 8px; overflow-x:auto; overflow-y:hidden; align-items:center; padding: 10px clamp(14px, 3vw, 34px); scrollbar-color: rgba(255,255,255,.45) rgba(255,255,255,.12); }
    .thumb { flex: 0 0 auto; height: var(--thumb-h); aspect-ratio: 1448/1086; border-radius: 8px; overflow:hidden; border: 2px solid transparent; padding:0; background:#111; cursor:pointer; opacity:.62; transition: opacity .16s ease, border-color .16s ease, transform .16s ease; }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb.active { opacity:1; border-color:#f7f2ea; transform: translateY(-2px); }
    .hint { position:absolute; left: 50%; bottom: 14px; transform: translateX(-50%); color: rgba(247,242,234,.78); background: rgba(0,0,0,.38); border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 7px 12px; font-size: 12px; opacity: 0; transition: opacity .2s ease; pointer-events:none; }
    .hint.show { opacity:1; }
    @media (max-width: 760px) {
      .app { grid-template-rows: 48px 1fr 84px; }
      header { padding: 0 12px; }
      .brand strong { font-size: 11px; letter-spacing:.13em; }
      .brand span, .btn.pdf { display:none; }
      .counter { font-size: 12px; }
      main { padding: 8px 14px 12px; }
      .stage { width: 100%; max-height: calc(100svh - 146px); border-radius: 12px; }
      .navbtn { width: 42px; height: 42px; font-size: 25px; top: auto; bottom: 12px; margin-top:0; background: rgba(0,0,0,.46); }
      .navbtn.left { left: 16px; }
      .navbtn.right { right: 16px; }
      :root { --thumb-h: 54px; }
      .thumbs { padding: 8px 12px; gap: 6px; }
    }
    @media (orientation: portrait) and (max-width: 760px) {
      .stage { width: 100%; }
    }
    @media print {
      html, body { overflow: visible; background: white; }
      .app { display:block; height:auto; }
      header, .bottom, .navbtn, .hint { display:none; }
      main { display:block; padding:0; }
      .stage { width:100%; max-height:none; height:auto; box-shadow:none; border-radius:0; overflow:visible; }
      .page { position:relative; opacity:1; transform:none; page-break-after:always; }
      .page:not(.active) { display:block; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="brand">
        <strong>Revista Izan · 18 cumpleaños</strong>
        <span>Versión final para GitHub Pages</span>
      </div>
      <div class="top-actions">
        <span class="counter" id="counter">1 / 19</span>
        <a class="btn pdf" href="assets/pdf/revista-izan-v1-final-imprenta.pdf" download>PDF imprenta</a>
        <button class="btn" id="fullscreen" type="button">Pantalla completa</button>
      </div>
    </header>
    <main id="touchZone" aria-label="Revista navegable">
      <button class="navbtn left" id="prev" type="button" aria-label="Página anterior">‹</button>
      <section class="stage" id="stage"></section>
      <button class="navbtn right" id="next" type="button" aria-label="Página siguiente">›</button>
      <div class="hint" id="hint">Usa flechas, teclado o desliza</div>
    </main>
    <div class="bottom">
      <div class="progress"><div class="bar" id="bar"></div></div>
      <nav class="thumbs" id="thumbs" aria-label="Miniaturas"></nav>
    </div>
  </div>
  <script>
    const pages = [{"n": 1, "title": "01_portada_birthday_magazine", "src": "assets/pages/page-01.webp", "thumb": "assets/pages/thumb-01.webp"}, {"n": 2, "title": "02_editor_note_presentacion", "src": "assets/pages/page-02.webp", "thumb": "assets/pages/thumb-02.webp"}, {"n": 3, "title": "03_perfil_instagram_netflix_intro", "src": "assets/pages/page-03.webp", "thumb": "assets/pages/thumb-03.webp"}, {"n": 4, "title": "04_birthday_times_iconic_texts", "src": "assets/pages/page-04.webp", "thumb": "assets/pages/thumb-04.webp"}, {"n": 5, "title": "05_the_icon_fashion_style", "src": "assets/pages/page-05.webp", "thumb": "assets/pages/thumb-05.webp"}, {"n": 6, "title": "06_cancer_boy_zodiac", "src": "assets/pages/page-06.webp", "thumb": "assets/pages/thumb-06.webp"}, {"n": 7, "title": "07_birthday_calendar_august", "src": "assets/pages/page-07.webp", "thumb": "assets/pages/thumb-07.webp"}, {"n": 8, "title": "08_fun_facts_about_him", "src": "assets/pages/page-08.webp", "thumb": "assets/pages/thumb-08.webp"}, {"n": 9, "title": "09_in_his_moment_lifestyle", "src": "assets/pages/page-09.webp", "thumb": "assets/pages/thumb-09.webp"}, {"n": 10, "title": "10_growth_milestones", "src": "assets/pages/page-10.webp", "thumb": "assets/pages/thumb-10.webp"}, {"n": 11, "title": "11_vision_board_all_about_him", "src": "assets/pages/page-11.webp", "thumb": "assets/pages/thumb-11.webp"}, {"n": 12, "title": "12_scouting_report_keep_him_happy", "src": "assets/pages/page-12.webp", "thumb": "assets/pages/thumb-12.webp"}, {"n": 13, "title": "13_wanderlust_diaries_travel", "src": "assets/pages/page-13.webp", "thumb": "assets/pages/thumb-13.webp"}, {"n": 14, "title": "14_the_boys_friends", "src": "assets/pages/page-14.webp", "thumb": "assets/pages/thumb-14.webp"}, {"n": 15, "title": "15_our_journey_relationship", "src": "assets/pages/page-15.webp", "thumb": "assets/pages/thumb-15.webp"}, {"n": 16, "title": "16_memories_to_remember", "src": "assets/pages/page-16.webp", "thumb": "assets/pages/thumb-16.webp"}, {"n": 17, "title": "17_jeremys_playlist_closing", "src": "assets/pages/page-17.webp", "thumb": "assets/pages/thumb-17.webp"}, {"n": 18, "title": "18_editor", "src": "assets/pages/page-18.webp", "thumb": "assets/pages/thumb-18.webp"}, {"n": 19, "title": "19_last_page", "src": "assets/pages/page-19.webp", "thumb": "assets/pages/thumb-19.webp"}];
    const total = pages.length;
    let current = 0;
    let startX = 0;
    let endX = 0;
    const stage = document.getElementById('stage');
    const thumbs = document.getElementById('thumbs');
    const counter = document.getElementById('counter');
    const bar = document.getElementById('bar');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const hint = document.getElementById('hint');

    function build() {
      pages.forEach((p, idx) => {
        const fig = document.createElement('figure');
        fig.className = 'page' + (idx === 0 ? ' active' : '');
        fig.dataset.index = idx;
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = `Página ${idx + 1} de ${total}`;
        img.loading = idx < 2 ? 'eager' : 'lazy';
        img.decoding = 'async';
        fig.appendChild(img);
        stage.appendChild(fig);

        const b = document.createElement('button');
        b.className = 'thumb' + (idx === 0 ? ' active' : '');
        b.type = 'button';
        b.title = `Página ${idx + 1}`;
        b.setAttribute('aria-label', `Ir a página ${idx + 1}`);
        b.innerHTML = `<img src="${p.thumb}" alt="Miniatura página ${idx + 1}" loading="lazy">`;
        b.addEventListener('click', () => go(idx));
        thumbs.appendChild(b);
      });
      update();
      showHint();
    }

    function update() {
      document.querySelectorAll('.page').forEach((el, idx) => {
        el.classList.toggle('active', idx === current);
      });
      document.querySelectorAll('.thumb').forEach((el, idx) => {
        el.classList.toggle('active', idx === current);
        if (idx === current) el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
      });
      counter.textContent = `${current + 1} / ${total}`;
      bar.style.width = `${((current + 1) / total) * 100}%`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;
      preload(current + 1); preload(current - 1);
      history.replaceState(null, '', `#${String(current + 1).padStart(2, '0')}`);
    }

    function preload(i) {
      if (i < 0 || i >= total) return;
      const image = new Image();
      image.src = pages[i].src;
    }
    function go(i) {
      const next = Math.max(0, Math.min(total - 1, i));
      if (next === current) return;
      current = next;
      update();
    }
    function next() { go(current + 1); }
    function prev() { go(current - 1); }
    function showHint() {
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 2200);
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') next();
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') prev();
      if (e.key === 'Home') go(0);
      if (e.key === 'End') go(total - 1);
    });
    const touchZone = document.getElementById('touchZone');
    touchZone.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, {passive:true});
    touchZone.addEventListener('touchend', e => {
      endX = e.changedTouches[0].screenX;
      const diff = endX - startX;
      if (Math.abs(diff) > 46) diff < 0 ? next() : prev();
    }, {passive:true});
    document.getElementById('fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    const hash = location.hash.replace('#','');
    const start = parseInt(hash, 10);
    if (!Number.isNaN(start) && start >= 1 && start <= total) current = start - 1;
    build();
  </script>
</body>
</html>
